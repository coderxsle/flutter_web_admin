# 图书类别表
### 用于存储图书的分类信息

class: BookCategory
table: book_category
fields:
  ### 租户ID（0 表示系统租户）
  tenantId: int?, default = 0

  ### 类别的名称（必填）  
  name: String

  ### 类别的描述信息（可选）  
  description: String?

  ### 类别记录创建时间  
  createTime: DateTime, default = now

  ### 类别记录最后更新时间  
  updateTime: DateTime, default = now

  ### 是否删除
  isDeleted: bool, default = false