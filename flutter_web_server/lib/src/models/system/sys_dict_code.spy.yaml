### 字典类型表
class: SysDictCode
table: sys_dict_code
fields:
  id: int?                                 # 字典主键，自增编号
  tenantId: int?, default = 0              # 租户ID  0表示系统租户
  name: String                             # 字典名称
  code: String                             # 字典编码
  status: int                              # 状态（0停用 1正常）
  description: String?                          # 备注
  deleted: bool, default = false           # 是否删除
  creator: String?                         # 创建者
  createTime: DateTime, default = now      # 创建时间
  updater: String?                         # 更新者
  updateTime: DateTime                     # 更新时间

indexes:
  ### 字典编码全局唯一约束，确保系统中不能有重复的字典编码
  sys_dict_code_unique:
    fields: code
    unique: true
